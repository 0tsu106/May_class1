<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ポートフォリオ見本</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="profile-image">
        <img src="./image/icon.jpg" alt="プロフィール画像" />
      </div>
      <div>
        <p class="label">Portfolio</p>
        <h1>大津和希</h1>
        <p class="lead">ITガチ初心者</p>
      </div>
    </header>

    <main>
      <section class="section">
        <h2>プロフィール</h2>
        <div class="box">
          <p>北大工学部情報エレクトロニクス学科電気電子コースB3</p>
          <p>出身地：北見</p>
          <p>好きなこと：心理学・民俗学</p>
        </div>
      </section>

      <section class="section">
        <h2>できること</h2>
        <div class="card-list">
          <div class="card">HTMLでできることを入れる場所</div>
          <div class="card">CSSでできることを入れる場所</div>
          <div class="card">その他の得意なことを入れる場所</div>
        </div>
      </section>

      <section class="section">
        <h2>作品</h2>
        <div class="work">
          <div class="work-image">作品画像を入れる場所</div>
          <div>
            <h3>作品名を入れる場所</h3>
            <p>作品の説明、作った理由、工夫した点などを入れる場所です。</p>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>連絡先</h2>
        <div class="box">
          <p>メールアドレス、SNS、GitHubなどを入れる場所です。</p>
        </div>
      </section>
    </main>
  </body>
</html>
